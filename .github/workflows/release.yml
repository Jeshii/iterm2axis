name: Package and Release Spoon

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set version string
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "value=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Package Spoon
        run: |
          zip -r "iTerm2Axis.spoon.zip" iTerm2Axis.spoon/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iTerm2Axis.spoon.zip
          name: iTerm2Axis ${{ steps.version.outputs.value }}
          body_path: CHANGELOG.md

      - name: Upload dev build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: iTerm2Axis.spoon-${{ steps.version.outputs.value }}
          path: iTerm2Axis.spoon.zip
